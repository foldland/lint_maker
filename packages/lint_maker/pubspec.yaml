name: lint_maker
description: >-
  A script to help you create custom linting configurations.
  Creates analysis_options.yaml files to your liking.
version: 0.3.2+1
repository: https://github.com/foldland/lint_maker
issue_tracker: https://github.com/foldland/lint_maker/issues
topics:
  - analysis
  - lints

environment:
  sdk: ^3.8.0

resolution: workspace

dependencies:
  analyzer: ">=5.2.0 <14.0.0"
  checked_yaml: ^2.0.3
  freezed_annotation: ^3.1.0
  http: ^1.0.0
  json2yaml: ^3.0.1
  json_annotation: ^4.9.0
  version: ^3.0.0
  yaml: ^3.0.0

dev_dependencies:
  build_runner: ^2.7.1
  freezed: ^3.2.3
  json_serializable: ^6.11.1
  test: ^1.26.0

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

executables:
  lint_maker:
